appId: com.cloudclips.app

---
# E2E Test: Barber App Features Flow
# Tests: Barber login, View/manage appointments, Accept/decline bookings,
#        Complete appointments, View earnings, Manage availability, 
#        Manage services, View and reply to reviews
# Phase 32.5 - Barber App Features (42 test scenarios)

# ==============================
# Test 1: Barber Login
# ==============================
- launchApp:
    clearState: true

# Navigate to login
- tapOn: "Get Started"
- tapOn: "Login"

# Enter barber credentials
- tapOn: "Email"
- inputText: "barber@test.com"

- tapOn: "Password"
- inputText: "Test123!@#"

- tapOn: "Sign In"

# Wait for barber dashboard
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# Verify barber-specific UI elements
- assertVisible: "Today's Appointments"
- assertVisible: "Earnings"
- assertVisible: "Availability"

---
# ==============================
# Test 2: View Barber Dashboard
# ==============================
# Verify dashboard components
- assertVisible: "Dashboard"
- assertVisible: "Today's Appointments"
- assertVisible: "Weekly Stats"
- assertVisible: "Quick Actions"

# Check stats are visible
- assertVisible: "Appointments"
- assertVisible: "Revenue"
- assertVisible: "Rating"

# Verify quick action buttons
- assertVisible: "Set Availability"
- assertVisible: "Manage Services"
- assertVisible: "View Earnings"

---
# ==============================
# Test 3: View Appointments List
# ==============================
- tapOn: "Appointments"

# Verify appointments screen
- assertVisible: "Appointments"
- assertVisible: "Today"
- assertVisible: "Upcoming"
- assertVisible: "Past"

# Check today's appointments tab
- tapOn: "Today"
- assertVisible: "Today's Schedule"

# Check upcoming appointments
- tapOn: "Upcoming"
- assertVisible: "Upcoming Appointments"

# Check past appointments
- tapOn: "Past"
- assertVisible: "Past Appointments"

---
# ==============================
# Test 4: View Appointment Details
# ==============================
- tapOn: "Today"

# Tap on an appointment (if exists)
- tapOn:
    text: "View Details"
    optional: true

# Verify appointment details
- assertVisible:
    text: "Appointment Details"
    optional: true
- assertVisible:
    text: "Client"
    optional: true
- assertVisible:
    text: "Service"
    optional: true
- assertVisible:
    text: "Date"
    optional: true
- assertVisible:
    text: "Time"
    optional: true

# Go back
- tapOn:
    text: "Back"
    optional: true

---
# ==============================
# Test 5: Accept Pending Appointment
# ==============================
# Look for pending appointments
- scrollUntilVisible:
    element: "Pending"
    direction: DOWN
    optional: true

- tapOn:
    text: "Pending"
    optional: true

# If there are pending appointments
- tapOn:
    text: "Accept"
    optional: true

# Verify confirmation
- extendedWaitUntil:
    visible: "Appointment confirmed"
    timeout: 5000
    optional: true

---
# ==============================
# Test 6: Decline Pending Appointment
# ==============================
# Look for another pending appointment
- tapOn:
    text: "Pending"
    optional: true

- tapOn:
    text: "Decline"
    optional: true

# Verify decline dialog
- assertVisible:
    text: "Decline Appointment"
    optional: true
- assertVisible:
    text: "Reason"
    optional: true

# Enter reason
- tapOn:
    text: "Reason"
    optional: true
- inputText: "Not available at this time"

# Confirm decline
- tapOn:
    text: "Confirm Decline"
    optional: true

# Verify declined
- extendedWaitUntil:
    visible: "Appointment declined"
    timeout: 5000
    optional: true

---
