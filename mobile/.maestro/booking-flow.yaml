appId: com.cloudclips.app

---
# E2E Test: Complete Booking Flow
# Tests: Service Selection, Date/Time, Confirmation, Payment, Management

# ==============================
# Setup: Login first
# ==============================
- launchApp:
    clearState: true

# Login with test account
- tapOn: "Login"
- tapOn: "Email"
- inputText: "client@test.com"
- tapOn: "Password"
- inputText: "Test123!@#"
- tapOn: "Sign In"

# Wait for home screen
- extendedWaitUntil:
    visible: "Find Barbers"
    timeout: 10000

---
# ==============================
# Test 1: Navigate to Barber Profile
# ==============================
# Select first barber
- tapOn:
    id: "barber-card-0"

# Verify barber profile loaded
- extendedWaitUntil:
    visible: "Book Appointment"
    timeout: 5000

- assertVisible: "Services"

---
# ==============================
# Test 2: Service Selection
# ==============================
# Tap Book Appointment
- tapOn: "Book Appointment"

# Verify service selection screen
- assertVisible: "Select Services"

# Select a single service
- tapOn:
    id: "service-item-0"

# Verify service selected (highlighted)
- assertVisible:
    id: "service-selected-0"
    optional: true

# Check total is updated
- assertVisible: "$"

# Select additional service
- tapOn:
    id: "service-item-1"
    optional: true

# Verify total updated for multiple services
- assertVisible: "$"

# Deselect second service
- tapOn:
    id: "service-item-1"
    optional: true

# Continue to date selection
- tapOn: "Continue"

---
# ==============================
# Test 3: Date Selection
# ==============================
# Verify date picker is shown
- assertVisible: "Select Date"

# Verify current month is displayed
- assertVisible:
    id: "calendar-month"

# Try to select past date (should be disabled)
- tapOn:
    id: "past-date"
    optional: true

# Select a future date
- tapOn:
    id: "available-date-0"
    optional: true

# If no available date in current view, navigate to next month
- tapOn:
    id: "next-month"
    optional: true

# Select available date
- tapOn:
    id: "available-date"
    optional: true

---
# ==============================
# Test 4: Time Selection
# ==============================
# Verify time slots are shown
- assertVisible: "Select Time"

# Available slots should be shown
- assertVisible:
    id: "time-slot-0"
    optional: true

# Select a time slot
- tapOn:
    id: "time-slot-0"
    optional: true

# Fallback: tap on first available time
- tapOn:
    text: "10:00 AM"
    optional: true

- tapOn:
    text: "11:00 AM"
    optional: true

# Continue to booking summary
- tapOn: "Continue"

---
# ==============================
# Test 5: Add Booking Notes
# ==============================
# Verify notes field is available
- assertVisible: "Add Notes"

# Tap to add notes
- tapOn: "Add Notes"

# Enter notes
- inputText: "Please keep it short on the sides. First time customer."

# Save notes
- tapOn: "Done"

---
# ==============================
# Test 6: Apply Coupon Code
# ==============================
# Tap to add coupon
- tapOn: "Add Coupon"

# Enter invalid coupon first
- inputText: "INVALIDCODE"
- tapOn: "Apply"

# Verify error message
- assertVisible:
    text: "Invalid coupon"
    optional: true

# Clear and enter valid coupon
- clearText
- inputText: "FIRST10"
- tapOn: "Apply"

# Verify discount applied
- assertVisible:
    text: "10% off"
    optional: true

---
# ==============================
# Test 7: Booking Summary Review
# ==============================
# Verify booking summary
- assertVisible: "Booking Summary"

# Check service is listed
- assertVisible:
    id: "summary-service"

# Check date and time are correct
- assertVisible:
    id: "summary-datetime"

# Check barber name
- assertVisible:
    id: "summary-barber"

# Check total amount
- assertVisible: "Total"
- assertVisible: "$"

---
# ==============================
# Test 8: Payment and Confirmation
# ==============================
# Tap confirm and pay
- tapOn: "Confirm & Pay"

# Wait for payment sheet
- extendedWaitUntil:
    visible: "Payment"
    timeout: 5000

# In dev mode, payment should auto-succeed or show test card
# Select saved card or add new card
- tapOn:
    id: "saved-card-0"
    optional: true

# If no saved card, add test card
- tapOn:
    text: "Add Card"
    optional: true

# Complete payment (dev mode auto-succeeds)
- tapOn:
    text: "Pay"
    optional: true

# Verify booking confirmed
- extendedWaitUntil:
    visible: "Booking Confirmed"
    timeout: 10000

- assertVisible: "Your appointment is scheduled"

---
# ==============================
# Test 9: Add to Calendar
# ==============================
# Tap add to calendar
- tapOn:
    text: "Add to Calendar"
    optional: true

# Calendar permission may be requested
- tapOn:
    text: "Allow"
    optional: true

---
# ==============================
# Test 10: View Booking Details
# ==============================
# Tap view appointment
- tapOn: "View Appointment"

# Verify appointment details screen
- assertVisible: "Appointment Details"
- assertVisible:
    id: "appointment-status"
- assertVisible:
    id: "appointment-datetime"
- assertVisible:
    id: "appointment-barber"
- assertVisible:
    id: "appointment-service"

---
# ==============================
# Test 11: Navigate to Appointments List
# ==============================
# Go to appointments tab
- tapOn: "Appointments"

# Verify upcoming appointments tab
- assertVisible: "Upcoming"

# New booking should be visible
- assertVisible:
    id: "appointment-card-0"

---
# ==============================
# Test 12: View Past Appointments
# ==============================
# Tap past appointments tab
- tapOn: "Past"

# Verify past appointments or empty state
- assertVisible:
    text: "Past Appointments"
    optional: true

---
# ==============================
# Test 13: Reschedule Appointment
# ==============================
# Go back to upcoming
- tapOn: "Upcoming"

# Tap on appointment
- tapOn:
    id: "appointment-card-0"

# Tap reschedule
- tapOn: "Reschedule"

# Verify date picker opens
- assertVisible: "Select New Date"

# Select new date
- tapOn:
    id: "available-date-1"
    optional: true

# Select new time
- tapOn:
    id: "time-slot-1"
    optional: true

# Confirm reschedule
- tapOn: "Confirm Reschedule"

# Verify success
- extendedWaitUntil:
    visible: "Appointment Rescheduled"
    timeout: 5000

---
# ==============================
# Test 14: Cancel Appointment
# ==============================
# Go back to appointment details
- tapOn: "View Appointment"

# Tap cancel
- tapOn: "Cancel Appointment"

# Verify cancellation dialog
- assertVisible: "Cancel Appointment?"

# Check cancellation policy notice
- assertVisible:
    text: "Cancellation Policy"
    optional: true

# Confirm cancellation
- tapOn: "Yes, Cancel"

# Verify cancellation success
- extendedWaitUntil:
    visible: "Appointment Cancelled"
    timeout: 5000

# Verify refund notice (if applicable)
- assertVisible:
    text: "Refund"
    optional: true

---
# ==============================
# Test 15: Book Another Appointment (Quick Book)
# ==============================
# Navigate back to home
- tapOn: "Home"

# Find the same barber
- tapOn:
    id: "barber-card-0"

# Use quick rebook option if available
- tapOn:
    text: "Book Again"
    optional: true

# Or start new booking
- tapOn:
    text: "Book Appointment"
    optional: true

# Verify booking flow starts
- assertVisible:
    text: "Select Services"
    optional: true

# Go back to home
- tapOn: "Back"
- tapOn: "Back"

---
# ==============================
# Test 16: Push Notification Verification
# ==============================
# Note: This test verifies that booking triggers a notification
# The actual notification is verified manually or through system logs

# Navigate to notifications
- tapOn:
    text: "Notifications"
    optional: true

# Verify booking notification exists
- assertVisible:
    text: "Booking Confirmed"
    optional: true

---
# ==============================
# Test 17: Loyalty Points Earned
# ==============================
# Navigate to loyalty screen
- tapOn: "Profile"
- tapOn: "Loyalty"

# Verify points were credited (if booking was completed)
- assertVisible:
    id: "points-balance"
    optional: true

# Check transaction history
- tapOn: "History"
- assertVisible:
    text: "Points Earned"
    optional: true
