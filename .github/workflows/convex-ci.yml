name: Convex Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/convex-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/convex-ci.yml'

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.typecheck.outputs.passed }}
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run TypeScript type check (non-blocking)
        id: typecheck
        run: |
          if npm run typecheck; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Backend typecheck has existing baseline errors; deploy is skipped until fixed."
          fi

  deploy:
    name: Deploy to Convex Production
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.typecheck.outputs.passed == 'true'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Deploy to Convex
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
