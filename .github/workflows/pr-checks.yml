name: PR Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

      - name: Check for merge conflicts
        run: |
          git fetch origin main
          git merge-tree $(git merge-base HEAD origin/main) origin/main HEAD | grep -q '<<<<<<<' && exit 1 || exit 0
        continue-on-error: true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for console.log statements
        run: |
          if grep -r "console.log" mobile/src backend/convex --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "// console.log"; then
            echo "❌ Found console.log statements. Please remove them before merging."
            exit 1
          fi
        continue-on-error: true

      - name: Check for .env files
        run: |
          if find . -name ".env" -not -path "*/node_modules/*" -not -path "*/.git/*" | grep -q .; then
            echo "❌ Found .env files in repository. Please remove them."
            exit 1
          fi
